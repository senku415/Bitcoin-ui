<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bitcoin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Bitcoin</title>
</head>

<body>
    <div class="container">

        <div class="card purple">
            <div class="icon">
                <i class="fa-solid fa-hand-holding-dollar"></i>
            </div>
            <h2>Savings</h2>
        </div>
        <div class="card green">
            <div class="icon">
                <i class="fa-solid fa-bitcoin-sign"></i>
            </div>
            <h2>Bitcoin</h2>
        </div>

        <div class="card blue large">
            <div class="icon">
                <i class="fa-solid fa-chart-line" style="color: rgb(244, 244, 250);"></i>
            </div>
            <h2>Invest in Stocks</h2>
        </div>
    </div>
</body>

</html>
